name: Daily Card

on:
  schedule:
    # 北京时间每天早上 7:00 (UTC 23:00)
    - cron: '0 23 * * *'
  # 允许手动触发
  workflow_dispatch:

# 授予 Actions 写入仓库的权限
permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    # ponytail: 即便前一次失败也不影响下一次运行
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run generator
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python generate_daily.py

      - name: Commit update
        uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: 'daily: update card'
          file_pattern: 'data.json'
