name: Daily Card

on:
  schedule:
    # 北京时间每天早上 7:00 (UTC 23:00)
    - cron: '0 23 * * *'
  # 允许手动触发
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    # ponytail: 即便前一次失败也不影响下一次运行
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run generator
        env:
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: python generate_daily.py

      - name: Commit update
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'daily: update card'
          file_pattern: 'data.json'
