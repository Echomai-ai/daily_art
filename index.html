<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="每日诗意">
<title>每日诗意 · 武汉</title>
<style>
  /* === reset === */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; -webkit-text-size-adjust: 100%; }
  body {
    font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Serif SC", serif;
    background: #1a1a2e;
    color: #eee;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 12px;
  }

  /* === card === */
  .card {
    width: 100%;
    max-width: 480px;
    border-radius: 20px;
    overflow: hidden;
    background: rgba(30, 30, 50, 0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    position: relative;
  }

  /* === 图片区 === */
  .image-area {
    position: relative;
    width: 100%;
    aspect-ratio: 3 / 2;
    overflow: hidden;
    background: #2a2a3e;
  }
  .image-area img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: opacity 0.6s;
  }
  .image-area .image-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(26,26,46,0.9) 0%, transparent 50%);
  }
  /* 图片加载前占位 */
  .image-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
    color: #555;
  }

  /* === 日期 & 天气 === */
  .info-bar {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 16px 20px 0;
  }
  .date-block .date-cn {
    font-size: 1.1rem;
    font-weight: 600;
    color: #ccc;
  }
  .date-block .weekday {
    font-size: 0.85rem;
    color: #888;
    margin-top: 2px;
  }
  .date-block .solar-term {
    display: inline-block;
    margin-top: 6px;
    padding: 2px 10px;
    border-radius: 10px;
    font-size: 0.8rem;
    background: rgba(255,255,255,0.1);
    color: #f0c060;
  }
  .weather-block {
    text-align: right;
    font-size: 0.85rem;
    color: #aaa;
    line-height: 1.6;
  }
  .weather-block .temp {
    font-size: 1.5rem;
    font-weight: 700;
    color: #fff;
  }

  /* === 一句话 === */
  .sentence-area {
    padding: 16px 20px 0;
  }
  .sentence {
    font-size: 1.0rem;
    color: #ddd;
    line-height: 1.7;
    font-style: italic;
  }

  /* === 诗句 === */
  .poem-area {
    padding: 14px 20px 20px;
  }
  .poem-text {
    font-size: 1.25rem;
    font-weight: 600;
    color: #fff;
    line-height: 1.8;
    letter-spacing: 0.05em;
  }
  .poem-author {
    font-size: 0.85rem;
    color: #888;
    margin-top: 6px;
    text-align: right;
  }

  /* === 底部 === */
  .footer {
    padding: 0 20px 16px;
    font-size: 0.7rem;
    color: #555;
    text-align: center;
  }

  /* === 加载/错误 === */
  .loading, .error {
    text-align: center;
    padding: 40px 20px;
    color: #888;
  }
  .error { color: #c44; }

  /* === 响应式 === */
  @media (max-width: 400px) {
    .card { border-radius: 16px; }
    .poem-text { font-size: 1.15rem; }
    .sentence { font-size: 0.95rem; }
    .weather-block .temp { font-size: 1.3rem; }
  }
</style>
</head>
<body>

<div class="card" id="card">
  <div class="loading" id="loading">加载中...</div>
</div>

<script>
(async function() {
  const v_card = document.getElementById('card');

  // 读取 data.json
  let v_data;
  try {
    const v_resp = await fetch('data.json');
    if (!v_resp.ok) throw new Error('HTTP ' + v_resp.status);
    v_data = await v_resp.json();
  } catch (v_err) {
    // ponytail: data.json 不存在时展示占位页面，不白屏
    v_card.innerHTML = `<div class="error">
      <p>暂无数日数据</p>
      <p style="font-size:0.8rem;margin-top:8px;">请先运行 generate_daily.py 生成数据</p>
    </div>`;
    return;
  }

  // 图片加载占位
  const v_img_placeholder = `<div class="image-placeholder">&#x1f3a8;</div>`;

  // 天气 HTML
  let v_weather_html = '';
  if (v_data.weather) {
    const v_w = v_data.weather;
    v_weather_html = `
      <div class="temp">${v_w.temp}</div>
      <div>${v_w.desc} · 湿度${v_w.humidity}</div>
      <div>${v_w.high} / ${v_w.low} · ${v_w.wind}</div>`;
  }

  // 渲染
  v_card.innerHTML = `
    <div class="image-area">
      <div class="image-placeholder" id="img-ph">&#x1f3a8;</div>
      <img src="${v_data.image_url}" alt="" id="main-img"
           style="opacity:0;position:absolute;inset:0;width:100%;height:100%;object-fit:cover;"
           onload="this.style.opacity='1';document.getElementById('img-ph').style.display='none';"
           onerror="this.style.display='none';">
      <div class="image-overlay"></div>
    </div>
    <div class="info-bar">
      <div class="date-block">
        <div class="date-cn">${v_data.date_cn}</div>
        <div class="weekday">${v_data.weekday}</div>
        <div class="solar-term">${v_data.solar_term}</div>
      </div>
      <div class="weather-block">${v_weather_html}</div>
    </div>
    <div class="sentence-area">
      <div class="sentence">${v_data.sentence}</div>
    </div>
    <div class="poem-area">
      <div class="poem-text">${v_data.poem.text}</div>
      <div class="poem-author">—— ${v_data.poem.author}</div>
    </div>
    <div class="footer">
      生成于 ${v_data.generated_at} · 武汉
    </div>`;
})();
</script>
</body>
</html>
